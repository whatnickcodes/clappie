<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World - Clappie Projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0a0a0c;
      color: #e8e6e3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ff8ec6, #5ab89a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #8a8580;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      border: 1px solid #333;
      border-radius: 20px;
      font-size: 12px;
      color: #5ab89a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <p>Served from projects/ via Clappie</p>
    <p>If you can see this, the pipeline works.</p>
    <div class="badge">clappie projects</div>
  </div>
</body>
</html>
